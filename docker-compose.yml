
services:
  postgres:
    image: postgres:16-alpine
    container_name: mfp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mfp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mfp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mfp}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - mfp_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mfp} -d ${POSTGRES_DB:-mfp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: mfp-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_ADMIN_URL: postgres://${POSTGRES_USER:-mfp}:${POSTGRES_PASSWORD:-mfp_dev_password}@postgres:5432/${POSTGRES_DB:-mfp}
      DATABASE_URL: postgres://${APP_DB_USER:-app}:${APP_DB_PASSWORD:-app_dev_password}@postgres:5432/${POSTGRES_DB:-mfp}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev_access_secret_change_me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_me}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-7d}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: mfp-web
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:3000}
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mfp_pgdata:
